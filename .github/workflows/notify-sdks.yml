name: SDK Release Notification

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to notify (e.g. v2026-03-07)"
        required: true
        default: "v2026-03-07"
  push:
    tags:
      - "v[0-9]{4}-[0-9]{2}-[0-9]{2}"

jobs:
  notify-sdks:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Notify Python SDK
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: ${{ github.repository_owner }}/nan-python-sdk
          event-type: spec-release
          client-payload: "{\"version\": \"${{ github.event.inputs.version || github.ref_name }}\"}"

      - name: Notify JavaScript SDK
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: ${{ github.repository_owner }}/nan-js-sdk
          event-type: spec-release
          client-payload: "{\"version\": \"${{ github.event.inputs.version || github.ref_name }}\"}"
